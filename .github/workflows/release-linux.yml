name: Build Linux Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Publish Release (linux-x64)
        run: dotnet publish -c Release -r linux-x64 --self-contained false -o artifacts/publish

      - name: Include cfg files
        run: |
          mkdir -p artifacts/publish/cfg/BaboPlugin
          cp -r cfg/BaboPlugin/. artifacts/publish/cfg/BaboPlugin/

      - name: Create zip package
        run: |
          cd artifacts/publish
          zip -r ../BaboPlugin-linux-x64.zip .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BaboPlugin-linux-x64
          path: artifacts/BaboPlugin-linux-x64.zip

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/BaboPlugin-linux-x64.zip
